<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bottle Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #2a2a2e; overflow: hidden; }
    #unity-canvas { width: 100%; height: 100%; display: block; }
    #unity-loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #2a2a2e; color: #ccc; font-family: sans-serif; gap: 16px;
    }
    #unity-progress-bar {
      width: 220px; height: 6px; background: #444; border-radius: 3px; overflow: hidden;
    }
    #unity-progress-fill {
      height: 100%; width: 0; background: #8a6a2e; transition: width 0.2s;
    }
  </style>
</head>
<body>
  <div id="unity-loading">
    <span>Loading bottle viewer…</span>
    <div id="unity-progress-bar"><div id="unity-progress-fill"></div></div>
  </div>
  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <script>
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Build.loader.js";
    var config = {
      dataUrl:            buildUrl + "/Build.data",
      frameworkUrl:       buildUrl + "/Build.framework.js",
      codeUrl:            buildUrl + "/Build.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName:        "Vineyard360",
      productName:        "BottleConfigurator",
      productVersion:     "1.0",
    };

    var unityInstance = null;

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = function () {
      createUnityInstance(document.querySelector("#unity-canvas"), config, function (progress) {
        document.getElementById("unity-progress-fill").style.width = (progress * 100) + "%";
      }).then(function (instance) {
        unityInstance = instance;
        document.getElementById("unity-loading").style.display = "none";
        window.parent.postMessage({ source: "unity-bottle", payload: { event: "loaded" } }, "*");
      }).catch(function (err) {
        console.error("Unity failed to load:", err);
      });
    };
    document.body.appendChild(script);

    // ── Receive config messages from Salesforce ──────────────────────────
    window.addEventListener("message", function (e) {
      if (!unityInstance) return;
      var msg = e.data;
      if (!msg || msg.type !== "bottleConfig") return;

      var cfg = {
        glassColor: msg.glassColor || "",
        capColor:   msg.capColor   || "",
        labelColor: msg.labelColor || "",
        labelText:  msg.labelText  || ""
      };

      unityInstance.SendMessage("BottleRoot", "ApplyConfig", JSON.stringify(cfg));
    });
  </script>
</body>
</html>
